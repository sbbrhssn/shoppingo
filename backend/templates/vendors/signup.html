<!DOCTYPE html>
<html>
<head>
    <title>Vendor Signup</title>
</head>
<body>
<form id="vendorSignupForm">
    {% csrf_token %}
    <div class="form-row">
        <div class="form-group">
            <label>First Name</label>
            <input type="text" name="first_name" class="form-control" placeholder="First name">
        </div>
        <div class="form-group">
            <label>Last Name</label>
            <input type="text" name="last_name" class="form-control" placeholder="Last name">
        </div>
        <div class="form-group">
            <label>Shop Name</label>
            <input type="text" name="shop_name" class="form-control" placeholder="Shop name">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" class="form-control" placeholder="Email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-control" placeholder="Password">
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" name="phone_number" class="form-control" placeholder="Phone number">
        </div>
    </div>
    <div class="form-group">
        <label>Address 1</label>
        <input type="text" name="address_1" class="form-control" placeholder="Address 1">
    </div>
    <div class="form-group">
        <label>Address 2</label>
        <input type="text" name="address_2" class="form-control" placeholder="Apartment, studio, or floor">
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>District</label>
            <input type="text" id="districtSearch" class="form-control" placeholder="Search district...">
            <ul id="districtDropdown" style="display:none; list-style:none; border:1px solid #ccc; padding:0; margin:0;"></ul>
            <input type="hidden" name="district" id="districtId">
        </div>
        <div class="form-group">
            <label>Subdistrict</label>
            <select name="subdistrict" id="subdistrictSelect" class="form-control">
                <option value="">Select subdistrict...</option>
            </select>
        </div>
    </div>
    <button type="submit" class="btn btn-primary">Sign up</button>
</form>

<script>
    const districtSearch = document.getElementById('districtSearch');
    const districtDropdown = document.getElementById('districtDropdown');
    const districtId = document.getElementById('districtId');
    const subdistrictSelect = document.getElementById('subdistrictSelect');

    districtSearch.addEventListener('input', async function () {
        const search = this.value;
        if (search.length < 1) {
            districtDropdown.style.display = 'none';
            return;
        }
        const response = await fetch(`/vendors/districts/?search=${search}`);
        const districts = await response.json();
        districtDropdown.innerHTML = '';
        districts.forEach(d => {
            const li = document.createElement('li');
            li.textContent = d.name;
            li.style.padding = '8px';
            li.style.cursor = 'pointer';
            li.addEventListener('click', function () {
                districtSearch.value = d.name;
                districtId.value = d.id;
                districtDropdown.style.display = 'none';
                loadSubdistricts(d.id);
            });
            districtDropdown.appendChild(li);
        });
        districtDropdown.style.display = 'block';
    });

    async function loadSubdistricts(id) {
        const response = await fetch(`/vendors/districts/${id}/subdistricts/`);
        const subdistricts = await response.json();
        subdistrictSelect.innerHTML = '<option value="">Select subdistrict...</option>';
        subdistricts.forEach(s => {
            const option = document.createElement('option');
            option.value = s.id;
            option.textContent = s.name;
            subdistrictSelect.appendChild(option);
        });
    }

    document.getElementById('vendorSignupForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        document.querySelectorAll('.error-msg').forEach(el => el.remove());

        const formData = new FormData(this);
        const data = Object.fromEntries(formData.entries());

        const response = await fetch('/vendors/signup/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': formData.get('csrfmiddlewaretoken'),
            },
            body: JSON.stringify(data),
        });

        const result = await response.json();

        if (response.ok) {
            alert('Signup successful!');
        } else {
            Object.keys(result).forEach(field => {
                const input = document.querySelector(`[name="${field}"]`);
                if (input) {
                    const error = document.createElement('small');
                    error.className = 'error-msg';
                    error.style.color = 'red';
                    error.textContent = result[field][0];
                    input.parentNode.appendChild(error);
                }
            });
        }
    });
</script>
</body>
</html>
